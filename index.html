<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Catalog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title">Animations</h1>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Built dynamically by catalog.js -->
    </nav>
  </aside>

  <main class="content" id="content">
    <div class="card" id="animation-card">
      <!-- Header -->
      <div class="card-header" id="card-header">
        <div class="card-titles">
          <h2 class="card-name" id="card-name"></h2>
          <span class="card-feature" id="card-feature"></span>
        </div>
        <div class="card-actions">
          <a class="btn" id="btn-download" download>⬇ Download HTML</a>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="card-body">
        <div class="preview-section">
          <div class="preview-header">
            <div class="section-label">Preview</div>
            <button class="btn-replay" id="btn-replay" title="Replay">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 8a6 6 0 0 1 10.472-4H10.5a.5.5 0 0 0 0 1h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-1 0v1.47A7 7 0 1 0 15 8a.5.5 0 0 0-1 0 6 6 0 1 1-12 0z" fill="currentColor"/>
              </svg>
            </button>
          </div>
          <div class="preview" id="preview"></div>
        </div>

        <div class="right-column">
          <div>
            <div class="section-label">Specification</div>
            <div class="spec" id="spec"></div>
          </div>
          <div class="note" id="note" style="display:none"></div>
          <div class="code-blocks" id="code-blocks"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Animation sections go here -->
  <div id="animations" style="display:none">
    <section class="animation"
      data-feature="Live Now"
      data-name="Chat Button Vibrating Effect"
      data-duration="0.4s / 1.8s"
      data-easing="ease-in-out / ease-out"
      data-delay="0s, 0.15s, 0.3s (stagger)"
      data-css-vars="--vibrate-duration, --wave-duration, --wave-stagger"
      data-file="downloads/live-now/chat-button-animation.html">
    </section>

    <section class="animation"
      data-feature="Live Now"
      data-name="Content to Counter"
      data-duration="3.7s"
      data-easing="cubic-bezier(0.2, 0.9, 0.3, 1)"
      data-delay="800ms"
      data-css-vars="--ctc-sheet-duration, --ctc-sheet-collapse, --ctc-fly-duration, --ctc-badge-pop, --ctc-pause-idle, --ctc-pause-sheet"
      data-note="The content card flies to the counter badge only when the user dismisses the bottom sheet."
      data-file="downloads/live-now/content-to-counter.html">
    </section>

    <section class="animation"
      data-feature="Live Now"
      data-name="Video Shimmer Border"
      data-duration="2.5s"
      data-easing="linear"
      data-delay="0s"
      data-css-vars="--shimmer-speed, --shimmer-size"
      data-file="downloads/live-now/video-shimmer-border.html">
    </section>

    <section class="animation"
      data-feature="SwipeyTin"
      data-name="Card Swipe"
      data-duration="0.45s"
      data-easing="cubic-bezier(0.4, 0, 0.2, 1) / cubic-bezier(0.2, 0.9, 0.3, 1)"
      data-delay="0s"
      data-css-vars="--swipe-duration, --swipe-throw, --swipe-rotate, --stamp-duration, --rise-duration"
      data-note="Drag the card or use the like/dislike buttons. Swipe right for LIKE, swipe left for NOPE. Cards cycle infinitely."
      data-file="downloads/swipey-tin/card-swipe.html">
    </section>

    <section class="animation"
      data-feature="SwipeyTin"
      data-name="Style Select Screen"
      data-duration="2s / 2.5s"
      data-easing="ease-in-out / ease-out"
      data-delay="0s"
      data-note="Style selection screen with two animated hints: a pulsing green live-dot with expanding ring, and a bouncing 'Tap a style to select' label with double-bounce pattern."
      data-file="downloads/swipey-tin/style-select-screen.html">
    </section>
  </div>

  <script src="catalog.js"></script>
</body>
</html>
