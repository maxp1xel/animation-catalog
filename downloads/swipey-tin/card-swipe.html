<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Swipe — SwipeyTin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <style>
    /* === Tokens === */
    :root {
      --st-bg: #1a1521;
      --st-card-radius: 24px;
      --st-accent-from: #b14cee;
      --st-accent-to: #8049f3;
      --st-pink: #f16298;
      --st-text: #e9f2ff;
      --st-text-secondary: rgba(255,255,255,0.6);
      --st-glass: rgba(255,255,255,0.12);
      --st-glass-border: rgba(255,255,255,0.06);
      --st-font: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* === Reset === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* @snippet:css */
    :root {
      --swipe-duration: 0.45s;
      --swipe-throw: 150%;
      --swipe-rotate: 25deg;
      --stamp-duration: 0.25s;
      --rise-duration: 0.35s;
    }

    /* ---- Swipe out ---- */
    @keyframes swipe-right {
      0%   { transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(var(--swipe-throw)) rotate(var(--swipe-rotate)); opacity: 0; }
    }
    @keyframes swipe-left {
      0%   { transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(calc(var(--swipe-throw) * -1)) rotate(calc(var(--swipe-rotate) * -1)); opacity: 0; }
    }

    /* ---- Stamp flash ---- */
    @keyframes stamp-in {
      0%   { transform: scale(2.5) rotate(var(--stamp-rotate)); opacity: 0; }
      60%  { transform: scale(0.9) rotate(var(--stamp-rotate)); opacity: 1; }
      100% { transform: scale(1) rotate(var(--stamp-rotate)); opacity: 1; }
    }

    /* ---- Next card rises ---- */
    @keyframes card-rise {
      0%   { transform: scale(0.92) translateY(16px); opacity: 0.7; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ---- Card container ---- */
    .st-stack {
      position: relative;
      width: 100%;
      aspect-ratio: 343 / 457;
      perspective: 800px;
    }

    .st-card {
      position: absolute;
      inset: 0;
      border-radius: var(--st-card-radius);
      overflow: hidden;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform-origin: 50% 80%;
      will-change: transform;
      border: 1px solid var(--st-glass-border);
    }
    .st-card:active { cursor: grabbing; }

    .st-card.behind {
      transform: scale(0.92) translateY(16px);
      opacity: 0.7;
      pointer-events: none;
    }
    .st-card.far-behind {
      transform: scale(0.84) translateY(32px);
      opacity: 0.4;
      pointer-events: none;
    }

    /* ---- Swipe animation classes ---- */
    .st-card.swiping-right {
      animation: swipe-right var(--swipe-duration) cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }
    .st-card.swiping-left {
      animation: swipe-left var(--swipe-duration) cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }
    .st-card.rising {
      animation: card-rise var(--rise-duration) cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    /* ---- Card content ---- */
    .st-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .st-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
    }

    .st-card-name {
      font-family: var(--st-font);
      font-size: 28px;
      font-weight: 600;
      color: var(--st-text);
      letter-spacing: -0.56px;
      line-height: 1.3;
    }

    .st-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .st-tag {
      font-family: var(--st-font);
      font-size: 12px;
      font-weight: 500;
      color: white;
      background: var(--st-glass);
      border: 1px solid var(--st-glass-border);
      border-radius: 36px;
      padding: 4px 12px;
      line-height: 1.4;
    }

    /* ---- Stamp overlays ---- */
    .st-stamp {
      position: absolute;
      top: 60px;
      font-family: var(--st-font);
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 8px 20px;
      border-radius: 12px;
      border: 4px solid;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }
    .st-stamp-like {
      --stamp-rotate: -20deg;
      left: 20px;
      color: #4ade80;
      border-color: #4ade80;
      transform: rotate(-20deg);
    }
    .st-stamp-nope {
      --stamp-rotate: 20deg;
      right: 20px;
      color: #f87171;
      border-color: #f87171;
      transform: rotate(20deg);
    }
    .st-stamp.visible {
      animation: stamp-in var(--stamp-duration) cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    /* ---- Drag hint overlays ---- */
    .st-hint {
      position: absolute;
      top: 60px;
      font-family: var(--st-font);
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 8px 20px;
      border-radius: 12px;
      border: 4px solid;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.15s ease;
    }
    .st-hint-like {
      left: 20px;
      color: #4ade80;
      border-color: #4ade80;
      transform: rotate(-20deg);
    }
    .st-hint-nope {
      right: 20px;
      color: #f87171;
      border-color: #f87171;
      transform: rotate(20deg);
    }

    /* ---- Action buttons ---- */
    .st-actions {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .st-btn {
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .st-btn:active { transform: scale(0.92); }

    .st-btn-dislike {
      width: 56px;
      height: 56px;
      border-radius: 99px;
      background: var(--st-glass);
      border: 1px solid var(--st-glass);
      box-shadow: 0 0 128px rgba(0,0,0,0.18), 0 0 21px rgba(0,0,0,0.09);
    }
    .st-btn-dislike svg { width: 24px; height: 24px; }

    .st-btn-like {
      width: 72px;
      height: 72px;
      border-radius: 99px;
      background: linear-gradient(-34deg, var(--st-pink) 9%, var(--st-accent-to) 77%);
      box-shadow: 0 5px 26px rgba(104,26,199,0.61), 0 1px 4px rgba(104,26,199,0.31);
    }
    .st-btn-like svg { width: 32px; height: 32px; }

    /* ---- Nav dots ---- */
    .st-dots {
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      z-index: 5;
    }
    .st-dot {
      width: 6px;
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.5);
    }
    .st-dot.active {
      background: white;
      width: 12px;
    }
    /* @snippet:end */

    /* === Phone Frame === */
    .st-phone {
      width: 375px;
      height: 812px;
      border-radius: 44px;
      background: var(--st-bg);
      border: 2px solid #333;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 40px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* === Layout === */
    body {
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--st-font);
    }

    .st-topnav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 16px;
      flex-shrink: 0;
    }
    .st-logo {
      font-family: var(--st-font);
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: 2px;
    }
    .st-create-btn {
      font-family: var(--st-font);
      font-size: 12px;
      font-weight: 500;
      color: white;
      border: 1px solid var(--st-glass);
      background: none;
      border-radius: 12px;
      padding: 6px 16px;
      cursor: pointer;
      line-height: 1.4;
    }

    .st-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      padding: 0 16px 16px;
      overflow: hidden;
    }

    .st-cta {
      width: 100%;
      max-width: 323px;
      height: 44px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(139deg, var(--st-accent-from) 7%, var(--st-accent-to) 100%);
      box-shadow: 0 5px 26px rgba(104,26,199,0.61), 0 1px 4px rgba(104,26,199,0.31);
      color: white;
      font-family: var(--st-font);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.14px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .st-bottom-bar {
      padding: 12px 16px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .st-url-bar {
      background: rgba(21,21,21,0.8);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 10px 40px;
      color: white;
      font-family: 'SF Pro', -apple-system, sans-serif;
      font-size: 17px;
      font-weight: 510;
      text-align: center;
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body>
  <div class="st-phone">
    <div class="st-topnav">
      <div class="st-logo">SWIPEY</div>
      <button class="st-create-btn">Create your own</button>
    </div>

    <!-- @snippet:html -->
    <div class="st-main">
      <div class="st-stack" id="st-stack">
        <!-- Cards injected by JS -->
      </div>

      <div class="st-actions">
        <button class="st-btn st-btn-dislike" id="btn-nope" aria-label="Dislike">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </button>
        <button class="st-btn st-btn-like" id="btn-like" aria-label="Like">
          <svg viewBox="0 0 24 24" fill="white" stroke="none">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- @snippet:end -->

    <div class="st-bottom-bar">
      <div class="st-url-bar">swipey.ai</div>
    </div>
  </div>

  <script>
    /* @snippet:js */
    (function () {
      var PROFILES = [
        { name: 'Kira',  age: 22, img: 'assets/card-1.jpg', tags: ['Teen','Caucasian','Curvy','Submissive','Girlfriend','POV'] },
        { name: 'Miya',  age: 24, img: 'assets/card-3.png',  tags: ['Anime','Japanese','Petite','Dominant','Cosplay'] },
        { name: 'Luna',  age: 21, img: 'assets/card-1.jpg', tags: ['College','Latina','Athletic','Playful','GFE'] },
        { name: 'Aria',  age: 25, img: 'assets/card-3.png',  tags: ['Fantasy','Elf','Slim','Mysterious','RPG'] },
      ];

      var stack = document.getElementById('st-stack');
      var btnLike = document.getElementById('btn-like');
      var btnNope = document.getElementById('btn-nope');
      var current = 0;
      var busy = false;

      /* ---- Build card DOM ---- */
      function makeCard(profile, zClass) {
        var card = document.createElement('div');
        card.className = 'st-card' + (zClass ? ' ' + zClass : '');

        card.innerHTML =
          '<img class="st-card-img" src="' + profile.img + '" alt="" draggable="false">' +
          '<div class="st-dots">' +
            '<span class="st-dot active"></span><span class="st-dot"></span><span class="st-dot"></span>' +
          '</div>' +
          '<div class="st-stamp st-stamp-like">LIKE</div>' +
          '<div class="st-stamp st-stamp-nope">NOPE</div>' +
          '<div class="st-hint st-hint-like">LIKE</div>' +
          '<div class="st-hint st-hint-nope">NOPE</div>' +
          '<div class="st-card-info">' +
            '<div class="st-card-name">' + profile.name + ', ' + profile.age + '</div>' +
            '<div class="st-card-tags">' +
              profile.tags.map(function (t) { return '<span class="st-tag">' + t + '</span>'; }).join('') +
            '</div>' +
          '</div>';

        return card;
      }

      /* ---- Render visible stack (top + 1 behind + 1 far behind) ---- */
      function renderStack() {
        stack.innerHTML = '';
        var len = PROFILES.length;

        // Far behind
        var farIdx = (current + 2) % len;
        stack.appendChild(makeCard(PROFILES[farIdx], 'far-behind'));

        // Behind
        var behindIdx = (current + 1) % len;
        stack.appendChild(makeCard(PROFILES[behindIdx], 'behind'));

        // Top
        var topCard = makeCard(PROFILES[current], '');
        stack.appendChild(topCard);

        bindDrag(topCard);
      }

      /* ---- Swipe away ---- */
      function swipe(direction) {
        if (busy) return;
        busy = true;

        var topCard = stack.lastElementChild;
        var behindCard = topCard.previousElementSibling;
        var stampEl = topCard.querySelector(
          direction === 'right' ? '.st-stamp-like' : '.st-stamp-nope'
        );

        // Show stamp
        stampEl.classList.add('visible');

        // Animate top card out
        topCard.classList.add(direction === 'right' ? 'swiping-right' : 'swiping-left');

        // Rise the behind card
        if (behindCard) {
          behindCard.classList.remove('behind');
          behindCard.classList.add('rising');
        }

        topCard.addEventListener('animationend', function () {
          current = (current + 1) % PROFILES.length;
          busy = false;
          renderStack();
        }, { once: true });
      }

      /* ---- Drag / touch handling ---- */
      function bindDrag(card) {
        var startX = 0;
        var startY = 0;
        var dx = 0;
        var threshold = card.offsetWidth * 0.35;

        function onStart(e) {
          if (busy) return;
          if (!e.touches) e.preventDefault();
          var pt = e.touches ? e.touches[0] : e;
          startX = pt.clientX;
          startY = pt.clientY;
          dx = 0;
          card.style.transition = 'none';
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onEnd);
          document.addEventListener('touchmove', onMove, { passive: false });
          document.addEventListener('touchend', onEnd);
        }

        function onMove(e) {
          e.preventDefault();
          var pt = e.touches ? e.touches[0] : e;
          dx = pt.clientX - startX;
          var rotation = dx * 0.08;
          var progress = Math.min(Math.abs(dx) / threshold, 1);

          card.style.transform = 'translateX(' + dx + 'px) rotate(' + rotation + 'deg)';

          // Show directional hint
          var hintLike = card.querySelector('.st-hint-like');
          var hintNope = card.querySelector('.st-hint-nope');
          if (dx > 0) {
            hintLike.style.opacity = progress;
            hintNope.style.opacity = 0;
          } else {
            hintNope.style.opacity = progress;
            hintLike.style.opacity = 0;
          }
        }

        function onEnd() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onEnd);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onEnd);

          // Hide hints
          card.querySelector('.st-hint-like').style.opacity = 0;
          card.querySelector('.st-hint-nope').style.opacity = 0;

          if (Math.abs(dx) > threshold) {
            // Continue from current drag position via transition (not keyframe)
            var direction = dx > 0 ? 'right' : 'left';
            busy = true;

            var stampEl = card.querySelector(
              direction === 'right' ? '.st-stamp-like' : '.st-stamp-nope'
            );
            stampEl.classList.add('visible');

            var behindCard = card.previousElementSibling;
            if (behindCard) {
              behindCard.classList.remove('behind');
              behindCard.classList.add('rising');
            }

            var throwX = direction === 'right' ? stack.offsetWidth * 1.5 : stack.offsetWidth * -1.5;
            var throwR = direction === 'right' ? 25 : -25;

            card.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease';
            card.style.transform = 'translateX(' + throwX + 'px) rotate(' + throwR + 'deg)';
            card.style.opacity = '0';
            card.style.pointerEvents = 'none';

            card.addEventListener('transitionend', function handler(e) {
              if (e.propertyName !== 'transform') return;
              card.removeEventListener('transitionend', handler);
              current = (current + 1) % PROFILES.length;
              busy = false;
              renderStack();
            });
          } else {
            // Snap back
            card.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1)';
            card.style.transform = '';
          }
        }

        card.addEventListener('mousedown', onStart);
        card.addEventListener('touchstart', onStart, { passive: true });
      }

      /* ---- Button handlers ---- */
      btnLike.addEventListener('click', function () { swipe('right'); });
      btnNope.addEventListener('click', function () { swipe('left'); });

      /* ---- Init ---- */
      renderStack();
    })();
    /* @snippet:end */
  </script>
</body>
</html>
