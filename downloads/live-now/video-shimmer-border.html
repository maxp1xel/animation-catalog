<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Video Shimmer Border — Live Now</title>
        <style>
            /* === Reset === */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            /* @snippet:css */
            @property --shimmer-angle {
                syntax: "<angle>";
                initial-value: 0deg;
                inherits: false;
            }

            :root {
                --shimmer-speed: 1.5s;
                --shimmer-size: 4px;
            }

            @keyframes shimmer-rotate {
                to {
                    --shimmer-angle: 360deg;
                }
            }

            /* === Phone Frame === */
            .vsb-phone {
                width: 375px;
                height: 812px;
                border-radius: 44px;
                background: #1a1a1a;
                border: 2px solid #333;
                padding: 0;
                position: relative;
                overflow: hidden;
                box-shadow:
                    0 0 40px rgba(0, 0, 0, 0.6),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            }

            /* === Shimmer Border === */
            .vsb-root {
                position: absolute;
                inset: 0;
            }

            .vsb-video {
                position: absolute;
                inset: 0;
                border-radius: 42px;
                overflow: hidden;
                background: #1f1825;
            }

            .vsb-shimmer {
                position: absolute;
                inset: 0;
                border-radius: 42px;
                z-index: 2;
                padding: var(--shimmer-size, 4px);
                background: conic-gradient(
                    from var(--shimmer-angle),
                    transparent 0%,
                    #7a27ec 10%,
                    #f162a0 25%,
                    #7a27ec 35%,
                    transparent 45%,
                    transparent 100%
                );
                animation: shimmer-rotate var(--shimmer-speed) linear infinite;
                -webkit-mask:
                    linear-gradient(#000 0 0) content-box,
                    linear-gradient(#000 0 0);
                -webkit-mask-composite: xor;
                mask:
                    linear-gradient(#000 0 0) content-box,
                    linear-gradient(#000 0 0);
                mask-composite: exclude;
                pointer-events: none;
            }

            .vsb-shimmer::after {
                content: "";
                position: absolute;
                inset: -4px;
                border-radius: 46px;
                padding: var(--shimmer-size, 4px);
                background: conic-gradient(
                    from var(--shimmer-angle),
                    transparent 0%,
                    #7a27ec 10%,
                    #f162a0 25%,
                    #7a27ec 35%,
                    transparent 45%,
                    transparent 100%
                );
                opacity: 0.4;
                filter: blur(12px);
                z-index: -1;
            }

            .vsb-video video {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .vsb-overlay {
                position: absolute;
                inset: 0;
                border-radius: 42px;
                background: linear-gradient(
                    to bottom,
                    rgba(31, 24, 37, 0.4) 0%,
                    transparent 25%,
                    transparent 75%,
                    rgba(31, 24, 37, 0.7) 100%
                );
                pointer-events: none;
            }
            /* @snippet:end */

            /* === Layout === */
            body {
                background: #0d0d1a;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }
        </style>
    </head>
    <body>
        <div class="vsb-phone">
            <!-- @snippet:html -->
            <div class="vsb-root">
                <div class="vsb-video">
                    <video
                        src="idle.mp4"
                        loop
                        muted
                        autoplay
                        playsinline
                    ></video>
                    <div class="vsb-overlay"></div>
                </div>
                <div class="vsb-shimmer"></div>
            </div>
            <!-- @snippet:end -->
        </div>
    </body>
</html>
